name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build release binary
        run: swift build -c release

      - name: Build .app bundle
        run: |
          APP_NAME="MuneoTerm"
          APP_DIR="${APP_NAME}.app/Contents"
          mkdir -p "${APP_DIR}/MacOS"
          mkdir -p "${APP_DIR}/Resources"

          # Copy binary
          cp .build/release/${APP_NAME} "${APP_DIR}/MacOS/${APP_NAME}"

          # Create Info.plist
          cat > "${APP_DIR}/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>MuneoTerm</string>
            <key>CFBundleDisplayName</key>
            <string>MuneoTerm</string>
            <key>CFBundleIdentifier</key>
            <string>com.hosun.terminal</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleExecutable</key>
            <string>MuneoTerm</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.developer-tools</string>
          </dict>
          </plist>
          PLIST

          # Create zip
          ditto -c -k --sequesterRsrc --keepParent "${APP_NAME}.app" "${APP_NAME}-${GITHUB_REF_NAME}-macOS.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "MuneoTerm-${GITHUB_REF_NAME}-macOS.zip" --clobber
